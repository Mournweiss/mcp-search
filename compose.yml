services:
    searxng:
        build:
            context: ./services/searxng
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_SEARXNG:-docker.io/searxng/searxng}
                - IMAGE_VERSION=${VERSION_SEARXNG:-latest}
        container_name: ${PROJECT_NAME:-mcp-search}-searxng
        restart: unless-stopped
        ports:
            - "${SEARXNG_PORT:-8080}:8080"
        environment:
            - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8080}
            - SEARXNG_SETTINGS_PATH=${SEARXNG_SETTINGS_PATH:-/etc/searxng/settings.yml}
            - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-your-secret-here}
            - SEARXNG_USE_X_FORWARDED_HOST=true
            - SEARXNG_DEBUG=${SEARXNG_DEBUG:-false}
            - SEARXNG_INSTANCE_NAME=${SEARXNG_INSTANCE_NAME:-MCP Search Instance}
            - SEARXNG_USE_DEFAULT_SETTINGS=${SEARXNG_USE_DEFAULT_SETTINGS:-true}
            - SEARXNG_LIMITER_ENABLED=${SEARXNG_LIMITER_ENABLED:-true}
            - GRANIAN_WORKERS=${GRANIAN_WORKERS:-2}
            - GRANIAN_WORKER_THREADS=${GRANIAN_WORKER_THREADS:-4}
            - GRANIAN_LOG_LEVEL=${GRANIAN_LOG_LEVEL:-warning}
            - FORCE_OWNERSHIP=${FORCE_OWNERSHIP:-true}
        volumes:
            - ./services/searxng/settings.yml:/etc/searxng/settings.yml
            - ./services/searxng/limiter.toml:/etc/searxng/limiter.toml
        networks:
            - mcp-network
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    mcp-searxng:
        build:
            context: ./services/mcp-searxng
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_MCP_SEARXNG:-docker.io/isokoliuk/mcp-searxng}
                - IMAGE_VERSION=${VERSION_MCP_SEARXNG:-latest}
        container_name: ${PROJECT_NAME:-mcp-search}-mcp-searxng
        restart: unless-stopped
        ports:
            - "${MCP_SEARXNG_PORT:-30019}:3000"
        environment:
            - SEARXNG_URL=http://searxng:${SEARXNG_PORT:-8080}
            - HOST=${MCP_SEARXNG_HOST:-0.0.0.0}
            - MCP_HTTP_PORT=3000
            - MCP_HTTP_HARDEN=${MCP_SEARXNG_HTTP_HARDEN:-false}
            - MCP_HTTP_AUTH_TOKEN=${MCP_SEARXNG_HTTP_AUTH_TOKEN:-}
            - MCP_HTTP_ALLOWED_ORIGINS=${MCP_SEARXNG_HTTP_ALLOWED_ORIGINS:-}
            - MCP_HTTP_ALLOWED_HOSTS=${MCP_SEARXNG_HTTP_ALLOWED_HOSTS:-}
            - MCP_HTTP_ALLOW_PRIVATE_URLS=${MCP_SEARXNG_HTTP_ALLOW_PRIVATE_URLS:-false}
            - MCP_HTTP_EXPOSE_FULL_CONFIG=${MCP_SEARXNG_HTTP_EXPOSE_FULL_CONFIG:-false}
            - AUTH_USERNAME=${MCP_SEARXNG_AUTH_USERNAME:-}
            - AUTH_PASSWORD=${MCP_SEARXNG_AUTH_PASSWORD:-}
            - USER_AGENT=${MCP_SEARXNG_USER_AGENT:-}
            - URL_READER_USER_AGENT=${MCP_SEARXNG_URL_READER_USER_AGENT:-}
            - HTTP_PROXY=${MCP_SEARXNG_HTTP_PROXY:-}
            - HTTPS_PROXY=${MCP_SEARXNG_HTTPS_PROXY:-}
            - NO_PROXY=${MCP_SEARXNG_NO_PROXY:-}
            - SEARCH_HTTP_PROXY=${MCP_SEARXNG_SEARCH_HTTP_PROXY:-}
            - SEARCH_HTTPS_PROXY=${MCP_SEARXNG_SEARCH_HTTPS_PROXY:-}
            - URL_READER_HTTP_PROXY=${MCP_SEARXNG_URL_READER_HTTP_PROXY:-}
            - URL_READER_HTTPS_PROXY=${MCP_SEARXNG_URL_READER_HTTPS_PROXY:-}
            - LOG_LEVEL=${LOG_LEVEL:-info}
        depends_on:
            searxng:
                condition: service_healthy
        networks:
            - mcp-network
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    redis:
        build:
            context: ./services/redis
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_REDIS:-docker.io/redis}
                - IMAGE_VERSION=${VERSION_REDIS:-7-alpine}
        container_name: ${PROJECT_NAME:-mcp-search}-redis
        restart: unless-stopped
        volumes:
            - ./services/redis/redis_data:/data
        networks:
            - mcp-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3

    nuq-postgres:
        build:
            context: ./services/nuq-postgres
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_POSTGRES:-ghcr.io/firecrawl/nuq-postgres}
                - IMAGE_VERSION=${VERSION_POSTGRES:-latest}
                - DB_NAME=${POSTGRES_DB:-firecrawl}
        container_name: ${PROJECT_NAME:-mcp-search}-nuq-postgres
        restart: unless-stopped
        environment:
            - POSTGRES_USER=${POSTGRES_USER:-firecrawl}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your-secret-here}
            - POSTGRES_DB=${POSTGRES_DB:-firecrawl}
            - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
        volumes:
            - ./services/nuq-postgres/pgdata:/var/lib/postgresql/data
            - ./services/nuq-postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
        networks:
            - mcp-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-firecrawl} -d ${POSTGRES_DB:-firecrawl}"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s

    playwright:
        build:
            context: ./services/playwright
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_PLAYWRIGHT:-mcr.microsoft.com/playwright}
                - IMAGE_VERSION=${VERSION_PLAYWRIGHT:-v1.58.2-noble}
                - PLAYWRIGHT_VERSION=${PLAYWRIGHT_NPM_VERSION:-1.58.2}
                - PLAYWRIGHT_PORT=${PLAYWRIGHT_PORT:-3000}
                - PLAYWRIGHT_HOST=${PLAYWRIGHT_HOST:-0.0.0.0}
        container_name: ${PROJECT_NAME:-mcp-search}-playwright
        restart: unless-stopped
        expose:
            - "3000"
        environment:
            - PLAYWRIGHT_SERVER_PORT=${PLAYWRIGHT_PORT:-3000}
            - PLAYWRIGHT_SERVER_HOST=${PLAYWRIGHT_HOST:-0.0.0.0}
            - PLAYWRIGHT_VERSION=${PLAYWRIGHT_NPM_VERSION:-1.58.2}
            - PLAYWRIGHT_BROWSERS_PATH=${PLAYWRIGHT_BROWSERS_PATH:-./services/playwright/ms-playwright}
            - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=${PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD:-0}
            - PLAYWRIGHT_CHROMIUM_ENABLE_SANDBOX=${PLAYWRIGHT_CHROMIUM_ENABLE_SANDBOX:-false}
            - PLAYWRIGHT_FIREFOX_ENABLE_SANDBOX=${PLAYWRIGHT_FIREFOX_ENABLE_SANDBOX:-false}
            - PLAYWRIGHT_WEBKIT_ENABLE_SANDBOX=${PLAYWRIGHT_WEBKIT_ENABLE_SANDBOX:-false}
            - PW_TEST_CONNECT_WS_ENDPOINT=${PW_TEST_CONNECT_WS_ENDPOINT:-}
            - PLAYWRIGHT_PROXY_SERVER=${PROXY_SERVER:-}
            - PLAYWRIGHT_PROXY_USERNAME=${PROXY_USERNAME:-}
            - PLAYWRIGHT_PROXY_PASSWORD=${PROXY_PASSWORD:-}
            - DEBUG=${PLAYWRIGHT_DEBUG:-pw:api}
            - LOG_LEVEL=${PLAYWRIGHT_LOG_LEVEL:-info}
        user: ${PLAYWRIGHT_RUN_AS_USER:-pwuser}
        security_opt:
            - seccomp=${PLAYWRIGHT_SECCOMP_PROFILE:-./services/playwright/seccomp_profile.json}
        ipc: ${PLAYWRIGHT_IPC_MODE:-host}
        init: true
        volumes:
            - ${PLAYWRIGHT_BROWSERS_PATH:-./services/playwright/ms-playwright}:/ms-playwright
            - ./services/playwright/seccomp_profile.json:/seccomp_profile.json:ro
        networks:
            - mcp-network
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    firecrawl:
        build:
            context: ./services/firecrawl
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_FIRECRAWL:-docker.io/firecrawl/firecrawl}
                - IMAGE_VERSION=${VERSION_FIRECRAWL:-latest}
        container_name: ${PROJECT_NAME:-mcp-search}-firecrawl
        restart: unless-stopped
        ports:
            - "${FIRECRAWL_PORT:-3000}:3000"
        environment:
            - PORT=${FIRECRAWL_PORT:-3000}
            - HOST=${FIRECRAWL_HOST:-0.0.0.0}
            - NODE_ENV=production
            - USE_DB_AUTHENTICATION=${USE_DB_AUTHENTICATION:-false}
            - NUQ_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@nuq-postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
            - NUQ_RABBITMQ_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:${RABBITMQ_PORT:-5672}/
            - REDIS_URL=redis://redis:${REDIS_PORT:-6379}
            - REDIS_RATE_LIMIT_URL=redis://redis:${REDIS_PORT:-6379}
            - REDIS_DB=${REDIS_DB:-0}
            - PLAYWRIGHT_MICROSERVICE_URL=http://playwright:${PLAYWRIGHT_PORT:-3000}/scrape
            - BULL_AUTH_KEY=${BULL_AUTH_KEY:-your-secret-here}
            - TEST_API_KEY=${TEST_API_KEY:-}
            - SEARXNG_ENDPOINT=http://searxng:${SEARXNG_PORT:-8080}
            - SEARXNG_ENGINES=${SEARXNG_ENGINES:-google,duckduckgo,bing}
            - SEARXNG_CATEGORIES=${SEARXNG_CATEGORIES:-general,it,science}
            - PROXY_SERVER=${PROXY_SERVER:-}
            - PROXY_USERNAME=${PROXY_USERNAME:-}
            - PROXY_PASSWORD=${PROXY_PASSWORD:-}
            - OPENAI_API_KEY=${OPENAI_API_KEY:-}
            - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
            - MODEL_NAME=${MODEL_NAME:-}
            - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
            - MODEL_EMBEDDING_NAME=${MODEL_EMBEDDING_NAME:-}
            - MAX_CPU=${MAX_CPU:-0.8}
            - MAX_RAM=${MAX_RAM:-0.8}
            - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
            - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
            - POSTHOG_HOST=${POSTHOG_HOST:-https://app.posthog.com}
            - ALLOW_LOCAL_WEBHOOKS=${ALLOW_LOCAL_WEBHOOKS:-false}
        depends_on:
            redis:
                condition: service_healthy
            nuq-postgres:
                condition: service_healthy
            playwright:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - mcp-network
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "require('http').get('http://localhost:3000/e2e-test', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    mcp-firecrawl:
        build:
            context: ./services/mcp-firecrawl
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_MCP_FIRECRAWL:-docker.io/mcp/firecrawl}
                - IMAGE_VERSION=${VERSION_MCP_FIRECRAWL:-latest}
        container_name: ${PROJECT_NAME:-mcp-search}-mcp-firecrawl
        restart: unless-stopped
        ports:
            - "${MCP_FIRECRAWL_PORT:-30028}:3000"
        environment:
            - CLOUD_SERVICE=false
            - HTTP_STREAMABLE_SERVER=true
            - HOST=${MCP_FIRECRAWL_HOST:-0.0.0.0}
            - FIRECRAWL_API_KEY=${MCP_FIRECRAWL_API_KEY:-}
            - FIRECRAWL_API_URL=http://firecrawl:${FIRECRAWL_PORT:-3000}
            - FIRECRAWL_RETRY_MAX_ATTEMPTS=${MCP_FIRECRAWL_RETRY_MAX_ATTEMPTS:-3}
            - FIRECRAWL_RETRY_INITIAL_DELAY=${MCP_FIRECRAWL_RETRY_INITIAL_DELAY:-1000}
            - FIRECRAWL_RETRY_MAX_DELAY=${MCP_FIRECRAWL_RETRY_MAX_DELAY:-10000}
            - FIRECRAWL_RETRY_BACKOFF_FACTOR=${MCP_FIRECRAWL_RETRY_BACKOFF_FACTOR:-2}
            - FIRECRAWL_CREDIT_WARNING_THRESHOLD=${MCP_FIRECRAWL_CREDIT_WARNING_THRESHOLD:-1000}
            - FIRECRAWL_CREDIT_CRITICAL_THRESHOLD=${MCP_FIRECRAWL_CREDIT_CRITICAL_THRESHOLD:-100}
            - LOG_LEVEL=${LOG_LEVEL:-info}
        depends_on:
            firecrawl:
                condition: service_healthy
        networks:
            - mcp-network
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s

    rabbitmq:
        build:
            context: ./services/rabbitmq
            dockerfile: Containerfile
            args:
                - IMAGE_NAME=${REGISTRY_RABBITMQ:-docker.io/rabbitmq}
                - IMAGE_VERSION=${VERSION_RABBITMQ:-3-management}
        container_name: ${PROJECT_NAME:-mcp-search}-rabbitmq
        restart: unless-stopped
        ports:
            - "${RABBITMQ_PORT:-5672}:${RABBITMQ_PORT:-5672}"
            - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
        environment:
            - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-firecrawl}
            - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-your-rabbitmq-password}
            - RABBITMQ_DEFAULT_VHOST=${RABBITMQ_DEFAULT_VHOST:-/}
            - RABBITMQ_NODE_PORT=${RABBITMQ_PORT:-5672}
            - RABBITMQ_DIST_PORT=${RABBITMQ_DIST_PORT:-25672}
            - RABBITMQ_NODENAME=${RABBITMQ_NODENAME:-rabbit@rabbitmq}
            - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=${RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS:-}
            - RABBITMQ_PLUGINS=${RABBITMQ_PLUGINS:-rabbitmq_management}
            - RABBITMQ_LOG_BASE=${RABBITMQ_LOG_BASE:-/var/log/rabbitmq}
            - RABBITMQ_MNESIA_BASE=${RABBITMQ_MNESIA_BASE:-/var/lib/rabbitmq/mnesia}
        networks:
            - mcp-network
        volumes:
            - ./services/rabbitmq/rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
            interval: 5s
            timeout: 5s
            retries: 12
            start_period: 10s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

networks:
    mcp-network:
        driver: bridge

volumes:
    redis_data:
        driver: local
    nuq_postgres_data:
        driver: local
    playwright_browsers:
        driver: local
    rabbitmq_data:
        driver: local
